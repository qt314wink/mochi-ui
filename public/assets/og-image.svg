<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#f0fdf4"/>
      <stop offset="50%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#fdf4ff"/>
    </linearGradient>
    <filter id="clay-shadow">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="rgba(0,0,0,0.10)"/>
    </filter>
    <filter id="inner-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative blobs -->
  <ellipse cx="980" cy="140" rx="180" ry="160" fill="#bbf7d0" opacity="0.55" filter="url(#clay-shadow)"/>
  <ellipse cx="1080" cy="500" rx="130" ry="110" fill="#bfdbfe" opacity="0.50" filter="url(#clay-shadow)"/>
  <ellipse cx="120"  cy="520" rx="140" ry="120" fill="#f9a8d4" opacity="0.40" filter="url(#clay-shadow)"/>
  <ellipse cx="200"  cy="120" rx="100" ry="90"  fill="#ddd6fe" opacity="0.45" filter="url(#clay-shadow)"/>

  <!-- Logo pill -->
  <rect x="80" y="60" width="96" height="96" rx="28" fill="#34d399" filter="url(#clay-shadow)"/>
  <rect x="80" y="60" width="96" height="96" rx="28" fill="rgba(255,255,255,0.25)"/>
  <text x="128" y="122" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="white" text-anchor="middle">M</text>

  <!-- Title -->
  <text x="80" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#1a1a2e" letter-spacing="-2">Mochi UI</text>

  <!-- Subtitle -->
  <text x="80" y="304" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="400" fill="#6b7280">Claymorphism Design System</text>

  <!-- Tag pills -->
  <rect x="80"  y="356" width="168" height="44" rx="22" fill="#bbf7d0" filter="url(#clay-shadow)"/>
  <text x="164" y="384" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#065f46" text-anchor="middle">Spring Physics</text>

  <rect x="264" y="356" width="152" height="44" rx="22" fill="#bfdbfe" filter="url(#clay-shadow)"/>
  <text x="340" y="384" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#1e40af" text-anchor="middle">15 Primitives</text>

  <rect x="432" y="356" width="152" height="44" rx="22" fill="#f9a8d4" filter="url(#clay-shadow)"/>
  <text x="508" y="384" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#9d174d" text-anchor="middle">Haptic Feedback</text>

  <rect x="600" y="356" width="148" height="44" rx="22" fill="#ddd6fe" filter="url(#clay-shadow)"/>
  <text x="674" y="384" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#5b21b6" text-anchor="middle">Astro + React</text>

  <!-- Mini card mockups -->
  <rect x="80"  y="440" width="200" height="120" rx="20" fill="#bbf7d0" filter="url(#clay-shadow)"/>
  <rect x="80"  y="440" width="200" height="120" rx="20" fill="rgba(255,255,255,0.35)"/>
  <rect x="100" y="460" width="60"  height="20"  rx="10" fill="#34d399"/>
  <rect x="100" y="492" width="160" height="10"  rx="5"  fill="rgba(0,0,0,0.08)"/>
  <rect x="100" y="510" width="120" height="10"  rx="5"  fill="rgba(0,0,0,0.05)"/>

  <rect x="300" y="440" width="200" height="120" rx="20" fill="#bfdbfe" filter="url(#clay-shadow)"/>
  <rect x="300" y="440" width="200" height="120" rx="20" fill="rgba(255,255,255,0.35)"/>
  <rect x="320" y="460" width="60"  height="20"  rx="10" fill="#3b82f6"/>
  <rect x="320" y="492" width="160" height="10"  rx="5"  fill="rgba(0,0,0,0.08)"/>
  <rect x="320" y="510" width="100" height="10"  rx="5"  fill="rgba(0,0,0,0.05)"/>

  <rect x="520" y="440" width="200" height="120" rx="20" fill="#f9a8d4" filter="url(#clay-shadow)"/>
  <rect x="520" y="440" width="200" height="120" rx="20" fill="rgba(255,255,255,0.35)"/>
  <rect x="540" y="460" width="60"  height="20"  rx="10" fill="#ec4899"/>
  <rect x="540" y="492" width="160" height="10"  rx="5"  fill="rgba(0,0,0,0.08)"/>
  <rect x="540" y="510" width="130" height="10"  rx="5"  fill="rgba(0,0,0,0.05)"/>

  <!-- URL / domain -->
  <text x="80" y="598" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" fill="#9ca3af">mochi-ui.vercel.app</text>
</svg>
