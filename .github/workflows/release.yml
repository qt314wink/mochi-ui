name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.2.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - run: npm install

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
            echo "TAG=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "TAG=v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Build library
        run: npx tsup src/components/index.ts --format esm,cjs --dts --out-dir dist

      - name: Write publish package.json
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          cat > dist/package.json << EOF
          {
            "name": "@mochiui/react",
            "version": "${VERSION}",
            "description": "A multi-sensory claymorphism design system with spring physics, haptic feedback, and Figma compatibility",
            "type": "module",
            "main": "./index.cjs",
            "module": "./index.js",
            "types": "./index.d.ts",
            "exports": {
              ".": {
                "types": "./index.d.ts",
                "import": "./index.js",
                "require": "./index.cjs"
              }
            },
            "keywords": ["claymorphism", "react", "design-system", "components", "animation", "spring-physics", "haptics", "bento", "ui", "css"],
            "peerDependencies": {
              "react": ">=18",
              "react-dom": ">=18",
              "motion": ">=11"
            },
            "engines": {
              "node": ">=18"
            },
            "repository": {
              "type": "git",
              "url": "git+https://github.com/qt314wink/mochi-ui.git"
            },
            "homepage": "https://github.com/qt314wink/mochi-ui",
            "license": "MIT"
          }
          EOF

      - name: Publish to npm
        run: |
          cp README.md dist/README.md
          cp LICENSE dist/LICENSE 2>/dev/null || true
          cd dist
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: ${{ steps.version.outputs.TAG }}
          body: 'Release ${{ steps.version.outputs.TAG }} of @mochiui/react'
          files: |
            dist/index.js
            dist/index.cjs
            dist/index.d.ts
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
