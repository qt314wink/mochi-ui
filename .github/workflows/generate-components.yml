name: Generate Tokenized Components

# ── TRIGGERS ───────────────────────────────────────────────────────────────────
on:
  # ▶ "Run workflow" button in GitHub Actions tab — this is what you click
  workflow_dispatch:
    inputs:
      force:
        description: 'Force regeneration even if no token change'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

  # Auto-trigger on token or script changes pushed to main
  push:
    branches:
      - main
    paths:
      - 'src/styles/tokens.css'
      - 'scripts/generate-tokens.js'
      - 'scripts/generate-components.js'

# ── PERMISSIONS ──────────────────────────────────────────────────────────────────
permissions:
  contents: write

# ── JOB ────────────────────────────────────────────────────────────────────────────
jobs:
  generate:
    runs-on: ubuntu-latest
    name: Regenerate token artifacts

    steps:
      # 1. Full checkout with history (needed so git push has context)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Node 20 LTS
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Install deps (uses package-lock.json which is committed)
      - name: Install dependencies
        run: npm ci

      # 4. Generate tokens.json / tokens.d.ts / tokens.scss / tokenMap.ts
      - name: Generate design token artifacts
        run: node scripts/generate-tokens.js

      # 5. Regenerate all 16 clay components idempotently
      - name: Generate clay components
        run: node scripts/generate-components.js

      # 6. Commit & push if anything changed
      #    git diff --quiet exits 0 if nothing changed — skips commit
      - name: Commit generated artifacts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "Nothing changed — skipping commit."
          else
            CHANGED=$(git diff --staged --name-only | tr '\n' ' ')
            git commit -m "chore(codegen): regenerate token artifacts [skip ci]

Changed: $CHANGED
Triggered by: ${{ github.event_name }} / ${{ github.actor }}"
            git push
          fi
