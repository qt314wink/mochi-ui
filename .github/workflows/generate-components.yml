name: Generate Mochi UI Tokens & Components

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'scripts/**'
      - 'src/styles/tokens.css'

permissions:
  contents: write

jobs:
  generate:
    name: Generate tokens and components
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate design tokens
        run: node scripts/generate-tokens.js

      - name: Generate clay components
        run: node scripts/generate-components.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "Nothing changed."
          else
            git commit -m "chore: regenerate token artifacts"
            git push
          fi
