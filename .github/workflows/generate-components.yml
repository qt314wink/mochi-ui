name: Generate Mochi UI Tokens & Components

# ── TRIGGERS ─────────────────────────────────────────────────────────────────
on:
  # ▶ Click "Run workflow" in the Actions tab to trigger manually
  workflow_dispatch:
    inputs:
      branch:
        description: 'Target branch'
        required: false
        default: 'main'
      commit_message:
        description: 'Custom commit message'
        required: false
        default: 'chore: auto-generate tokenized components'

  # Auto-run when tokens or scripts change on main
  push:
    branches:
      - main
    paths:
      - 'scripts/**'
      - 'src/styles/tokens.css'

# ── PERMISSIONS ───────────────────────────────────────────────────────────────
permissions:
  contents: write

# ── JOB ───────────────────────────────────────────────────────────────────────
jobs:
  generate:
    name: Generate tokens and components
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate design tokens
        run: node scripts/generate-tokens.js

      - name: Generate tokenized clay components
        run: node scripts/generate-components.js

      - name: TypeScript type-check
        run: npx tsc --noEmit --skipLibCheck || echo "Type check warnings — not blocking commit"

      - name: Commit and push generated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "Nothing changed — skipping commit."
          else
            BRANCH="${{ github.event.inputs.branch || github.ref_name }}"
            MSG="${{ github.event.inputs.commit_message || 'chore: auto-generate tokenized components [skip ci]' }}"
            git commit -m "$MSG"
            git push origin "$BRANCH"
          fi
